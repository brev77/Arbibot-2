# Hermes Agent Configuration
# See: docs/adr-hermes-agent-glm-telegram.md (Plan 5) and docs/adr-hermes-agent-integration.md (Plan 3)
#
# Copy to hermes-config.local.yaml and fill in secrets.
# Never commit secrets to git.

agent:
  name: arbibot-hermes-agent
  description: "Arbibot 2 operator assistant via Telegram"

  # LLM Provider — GLM 5.2 (Zhipu/Z.AI).
  # У NousResearch Hermes Agent нет нативного плагина под GLM, но API GLM совместим с OpenAI
  # Chat Completions, поэтому используем provider: openai + кастомный base_url.
  # Значения берутся из env — ничего не зашито жёстко.
  provider: ${HERMES_LLM_PROVIDER:openai}
  model: ${HERMES_LLM_MODEL:glm-5.2}
  base_url: ${HERMES_LLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}  # API Zhipu/Z.AI
  api_key: ${HERMES_LLM_API_KEY}  # pragma: allowlist secret

  # MCP Server connection
  mcp:
    transport: stdio
    command: node
    args:
      - ${HERMES_MCP_SERVER_PATH:../../packages/hermes-mcp-server/dist/index.js}
    env:
      HERMES_GATEWAY_URL: ${HERMES_GATEWAY_URL:http://localhost:3020}
      HERMES_API_KEY: ${HERMES_API_KEY}  # pragma: allowlist secret

  # Memory & context
  memory:
    backend: sqlite
    path: ${HERMES_MEMORY_PATH:./hermes-memory.db}
    session_ttl_minutes: 60

# Messaging platforms
messaging:
  # Личный бот только для оператора (whitelist OPERATOR_TELEGRAM_ID).
  # Токен создаётся через @BotFather в Telegram, ID оператора — у @userinfobot.
  telegram:
    enabled: ${HERMES_TELEGRAM_ENABLED:true}
    token: ${TELEGRAM_BOT_TOKEN}
    allowed_users:
      - ${OPERATOR_TELEGRAM_ID}
    commands:
      - /status    → skill:status_check
      - /plans     → skill:plan_review
      - /positions → skill:position_overview
      - /incidents → skill:incident_management
      - /safe      → skill:safe_mode_control
      - /approve   → skill:approval_handler
      - /explain   → skill:explain_bot
      - /config    → skill:config_management

  # Discord выключен по умолчанию (фокус на личном Telegram-боте).
  discord:
    enabled: ${HERMES_DISCORD_ENABLED:false}
    token: ${DISCORD_BOT_TOKEN}
    application_id: ${DISCORD_APP_ID}
    guild_id: ${DISCORD_GUILD_ID}
    alerts_channel_id: ${DISCORD_ALERTS_CHANNEL_ID}
    reports_channel_id: ${DISCORD_REPORTS_CHANNEL_ID}

# Notification routing
notifications:
  critical:
    - telegram
    - discord
  info:
    - telegram
  cron_reports:
    - discord

# Security — mutation approval
security:
  # Read-only tools execute immediately
  # Mutation tools require explicit operator approval
  approval_required:
    - arm_plan
    - execute_plan
    - enable_safe_mode
    - disable_safe_mode
    - resolve_incident
    - close_position
    # Config-management mutations (Plan 6). Gateway additionally enforces an
    # allowlist: only intake/paper/opportunity/dex/features keys are mutable;
    # risk/execution/capital return 403. See docs/adr-hermes-config-management.md.
    - update_config
    - rollback_config
    - promote_config
    - activate_config
  approval_timeout_minutes: 5

# Cron scheduling — периодические сводки в Telegram (агент «следит за ботом»).
cron:
  enabled: ${HERMES_CRON_ENABLED:true}
  timezone: UTC
  jobs:
    - name: status_heartbeat
      schedule: "*/15 * * * *"
      skill: status_check
      notify: [telegram]
      silent: true  # only notify on anomaly

    - name: reconciliation_report
      schedule: "0 */6 * * *"
      skill: incident_management
      notify: [telegram, discord]
      prompt: "Summarize open incidents and reconciliation mismatches"

    - name: daily_risk_summary
      schedule: "0 9 * * *"
      skill: position_overview
      notify: [discord]
      prompt: "Generate daily portfolio risk summary"

    - name: approval_queue_check
      schedule: "*/5 * * * *"
      skill: approval_handler
      notify: [telegram]
      prompt: "Check pending approvals and notify"
      silent: true  # only notify if queue non-empty

# Logging
logging:
  level: ${HERMES_LOG_LEVEL:info}
  format: json
  file: ${HERMES_LOG_FILE:./hermes-agent.log}