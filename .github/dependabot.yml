# Dependabot configuration for Arbibot 2 monorepo
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# ─── Billing-aware configuration (2026-06-14, revised 2026-07-10) ──────
# Root cause of CI failures on 2026-06-13: ~28 parallel Dependabot runs
# fired at the same minute (17:08 UTC), which exhausted the account's
# Actions minutes / spending limit and blocked all subsequent CI/CD/Security
# jobs with "recent account payments have failed".
#
# Root cause of lockfile desync (2026-06-15..2026-06-30): one update per
# workspace directory (13 backend apps + 8 packages) meant Dependabot
# bumped a dependency in a single apps/*/package.json and recalculated
# only that subtree's lockfile entries, leaving the other 11 copies of the
# same dev-tool (e.g. @nestjs/cli, present in 12 service manifests)
# unsynchronized. `npm ci` then failed with
#   "lock file's @nestjs/cli@11.0.21 does not satisfy @nestjs/cli@11.0.23".
#
# Fix (this file): collapse ALL npm workspaces into ONE config at
# directory: "/". Dependabot now updates the single root package.json +
# root package-lock.json, keeping the whole workspace graph consistent.
# Dev-tools shared across services (@nestjs/cli, jest, typescript) are
# hoisted to root devDependencies, so they resolve to one hoisted
# node_modules entry instead of 12 nested copies.
#
# Mitigations retained from the 2026-06-14 revision:
#   1. **Groups**: all minor+patch bumps → ONE PR per ecosystem.
#   2. **rebase-strategy: "disabled"**: no automatic rebases.
#   3. **open-pull-requests-limit**: low (3-5).
#   4. **Major bumps ignored**: semver-major stays pinned (security
#      advisories still open PRs via the ignore-unaffected flow).
#
# Expected Actions minutes usage: ~6× lower than the per-directory layout.
# After applying, monitor: https://github.com/settings/billing (Actions tab).
# ─────────────────────────────────────────────────────────────────────

version: 2

updates:
  # ─── npm (whole monorepo as one workspace graph) — MON 06:00 MSK ───────
  # Single config replaces 22 per-directory configs (13 apps + 8 packages + root).
  # Dependabot updates root package.json + root package-lock.json together,
  # so the entire dependency tree stays consistent for `npm ci`.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    target-branch: "main"
    rebase-strategy: "disabled"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # All minor/patch root + workspace deps → single PR
      npm-minor-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@types/node"
          - "typescript"
      # @types/* tracked separately (frequent churn)
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major version bumps require manual review
      # (security advisories still bypass ignore and open PRs)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Node engine pinned to LTS — never auto-bump major
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # TypeScript major bumps require full lint/test review
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # ─── GitHub Actions — SAT 04:00 MSK ────────────────────────────────────
  # Grouped: all action bumps land in ONE PR
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "04:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"

  # ─── Docker base images — SAT 05:00 MSK ────────────────────────────────
  # Grouped: all image bumps land in ONE PR
  - package-ecosystem: "docker"
    directory: "/infra/docker"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "05:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "deps(docker)"
    groups:
      docker:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
