# Dependabot configuration for Arbibot 2 monorepo
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# ─── Billing-aware configuration (2026-06-14) ───────────────────────────
# Root cause of CI failures on 2026-06-13: ~28 parallel Dependabot runs
# fired at the same minute (17:08 UTC), which exhausted the account's
# Actions minutes / spending limit and blocked all subsequent CI/CD/Security
# jobs with "recent account payments have failed".
#
# Mitigations applied in this file:
#   1. **Groups**: all minor+patch bumps are merged into ONE PR per directory
#      (previously each transitive dep produced its own PR → N× CI runs).
#   2. **Spread schedules**: backend apps / packages / actions / docker are
#      spread across MON–FRI at different times so no more than ~5 configs
#      fire in the same hour (was 25+ simultaneously).
#   3. **rebase-strategy: "disabled"**: no automatic rebases — each rebase
#      previously retriggers full CI/CD/Security (~60 min of Actions minutes).
#   4. **open-pull-requests-limit**: lowered to 2 (apps/packages) / 3 (root)
#      — majors still get individual PRs (and are mostly auto-ignored below).
#   5. **Major bumps ignored**: semver-major stays pinned (security advisories
#      still open PRs via `@dependabot ignore`-unaffected security flow).
#
# Expected Actions minutes usage: ~3× lower than the previous configuration.
# After applying, monitor: https://github.com/settings/billing (Actions tab).
# ─────────────────────────────────────────────────────────────────────

version: 2

updates:
  # ─── Root (monorepo tooling: turbo, eslint, typescript) — MON 06:00 MSK ─
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 3
    target-branch: "main"
    rebase-strategy: "disabled"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # All minor/patch root deps → single PR
      npm-minor-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@types/node"
          - "typescript"
      # @types/* tracked separately (frequent churn)
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major version bumps require manual review
      # (security advisories still bypass ignore and open PRs)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Node engine pinned to LTS — never auto-bump major
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # TypeScript major bumps require full lint/test review
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

