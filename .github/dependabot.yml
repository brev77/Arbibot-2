# Dependabot configuration for Arbibot 2 monorepo
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Root package.json (workspaces root, turbo, eslint, typescript)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 10
    target-branch: "main"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Group minor/patch updates of @types/* to reduce PR noise
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      # Group NestJS ecosystem updates
      nestjs:
        patterns:
          - "@nestjs/*"
          - "nest*"
        update-types:
          - "minor"
          - "patch"
      # Group Fastify ecosystem
      fastify:
        patterns:
          - "@fastify/*"
          - "fastify"
        update-types:
          - "minor"
          - "patch"
      # Group TypeORM + pg ecosystem
      typeorm:
        patterns:
          - "typeorm"
          - "pg"
          - "pg-*"
        update-types:
          - "minor"
          - "patch"
      # Group testing tooling
      testing:
        patterns:
          - "jest"
          - "@types/jest"
          - "ts-jest"
          - "supertest"
          - "@types/supertest"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major version bumps require manual review (security advisory still opens PR)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Node engine pinned to LTS — do not auto-bump
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # TypeScript major bumps require full lint/test review
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Per-app package.json (catch workspace-local deps that root scan misses)
  - package-ecosystem: "npm"
    directory: "/apps/audit-service"
    schedule:
