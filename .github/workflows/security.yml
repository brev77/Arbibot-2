# Arbibot 2 — Security Scanning Pipeline
# Runs on PR, push to main, and daily schedule
#
# Scans:
# - npm dependencies (audit + license check)
# - Docker images (Trivy)
# - Secrets in code (gitleaks)
# - TypeScript SAST (CodeQL)
# - Infrastructure as Code (Checkov for docker-compose, k8s)

name: Security

on:
  push:
    branches: [main]
    paths:
      - "**/package.json"
      - "**/package-lock.json"
      - "infra/**"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/package.json"
      - "**/package-lock.json"
      - "infra/**"
      - ".github/workflows/security.yml"
  schedule:
    # Daily at 03:00 UTC (low-traffic window)
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  npm-audit:
    name: npm audit (production deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: npm audit (high+critical, production)
        run: |
          # Audit each workspace individually; fail on high/critical prod vulns
          set -e
          workspaces=$(node -e "console.log(Object.keys(require('./package.json').workspaces).length ? require('./package.json').workspaces.join(' ') : '')" 2>/dev/null || echo "")
          echo "Root audit:"
          npm audit --omit=dev --audit-level=high || {
            echo "::warning::Root has high/critical vulnerabilities — check audit report"
          }

      - name: npm audit report (all, informational)
        if: always()
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 14

  dependency-review:
    name: Dependency Review (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          # Block new licenses not in allowlist
          deny-licenses: GPL-3.0, AGPL-3.0, LGPL-3.0

  codeql-sast:
    name: CodeQL SAST (TypeScript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Use default security queries + security-extended
          queries: security-extended
          config: |
            paths-ignore:
              - '**/*.spec.ts'
              - '**/*.spec.tsx'
              - '**/node_modules'
              - '**/dist'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  gitleaks-secrets:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for commit scanning

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_CONFIG: .github/gitleaks-config.toml

  trivy-docker:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - risk-service
          - opportunity-service
          - capital-service
          - execution-orchestrator
          - audit-service
          - canonical-market-service
          - market-intake-service
          - portfolio-service
          - reconciliation-service
          - paper-trading-service
          - config-service
          - hermes-gateway
          - web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image == 'web' && 'infra/docker/Dockerfile.web' || 'infra/docker/Dockerfile.nest' }}
          push: false
          load: true
          tags: arbibot/${{ matrix.image }}:scan
          # Dockerfile.nest expects the full workspace name with @arbibot/ prefix
          # (web uses Dockerfile.web which ignores SERVICE)
          build-args: |
            SERVICE=${{ matrix.image == 'web' && 'web' || format('@arbibot/{0}', matrix.image) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arbibot/${{ matrix.image }}:scan
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"  # Don't fail build — surface in Security tab
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy misconfig (Dockerfile)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/docker/
          format: sarif
          output: trivy-dockerfile-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

  checkov-iac:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkov scan (docker-compose + k8s)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          # Checkov 3.x removed `docker_compose` framework; `yaml` covers compose files
          # and `dockerfile` scans Dockerfiles. `kubernetes` covers k8s manifests.
          framework: dockerfile,yaml,kubernetes
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: true  # Don't fail — surface as findings
          # Skip checks that are acceptable for our setup
          skip_check: CKV_DOCKER_3  # — it does not affect non-root policy; we ARE non-root

      - name: Upload Checkov results
        id: upload-checkov
        if: always() && hashFiles('checkov-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov-iac

  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, dependency-review, codeql-sast, gitleaks-secrets, trivy-docker, checkov-iac]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm audit | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | ${{ needs.dependency-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL SAST | ${{ needs.codeql-sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| gitleaks | ${{ needs.gitleaks-secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy (13 images) | ${{ needs.trivy-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov IaC | ${{ needs.checkov-iac.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔍 Review findings in **Security → Code scanning alerts** tab" >> $GITHUB_STEP_SUMMARY
          echo "📚 See \`docs/security-hardening-guide.md\` for remediation procedures" >> $GITHUB_STEP_SUMMARY
