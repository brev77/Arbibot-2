name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test

  secret-scan:
    runs-on: ubuntu-latest
    # Lightweight key-leakage grep guard (no npm ci needed). Pattern guard: catches logging a
    # decrypted key, decrypting outside KeyVaultService/wallet-manager, or hardcoding a key in
    # production code. Complements .github/gitleaks-config.toml (value guard).
    # continue-on-error: review findings, but don't block until the guard is proven stable.
    # Flip to false (or remove the flag) once zero findings hold for several PRs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Key-leakage static scan (K1/K2)
        run: bash tools/ci-key-leakage.sh

  e2e-phase2:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arbibot
          POSTGRES_PASSWORD: arbibot
          POSTGRES_DB: arbibot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arbibot -d arbibot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Phase 2 controlled execution (HTTP chain)
        env:
          DATABASE_URL: postgres://arbibot:arbibot@127.0.0.1:5432/arbibot
        run: bash tools/ci-e2e-phase2.sh

  e2e-phase2-watchlist-route-scoring:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arbibot
          POSTGRES_PASSWORD: arbibot
          POSTGRES_DB: arbibot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arbibot -d arbibot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Phase 2.2 watchlist tiering + route scoring writers smoke
        env:
          DATABASE_URL: postgres://arbibot:arbibot@127.0.0.1:5432/arbibot
        run: bash tools/ci-e2e-phase2-watchlist-route-scoring.sh

  e2e-phase3-paper-promotion:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arbibot
          POSTGRES_PASSWORD: arbibot
          POSTGRES_DB: arbibot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arbibot -d arbibot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Phase 3 paper promotion (outbox relay → paper)
        env:
          DATABASE_URL: postgres://arbibot:arbibot@127.0.0.1:5432/arbibot
        run: bash tools/ci-e2e-phase3-paper-promotion.sh

  e2e-phase3-paper-discovery:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arbibot
          POSTGRES_PASSWORD: arbibot
          POSTGRES_DB: arbibot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arbibot -d arbibot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Phase 3 paper discovery (worker + metrics)
        env:
          DATABASE_URL: postgres://arbibot:arbibot@127.0.0.1:5432/arbibot
          MARKET_INTAKE_SERVICE_URL: http://127.0.0.1:3015
          PAPER_API_BASE: http://127.0.0.1:3018
          PAPER_DISCOVERY_ENABLED: 'true'
          PAPER_DISCOVERY_INTERVAL_MS: '30000'
          PAPER_DISCOVERY_MIN_PROFIT_USD: '0.5'
          PAPER_DISCOVERY_MIN_LIQUIDITY_SCORE: '0.1'
          PAPER_DISCOVERY_MAX_CANDIDATES_PER_RUN: '10'
          PAPER_DISCOVERY_PAPER_ONLY_TOKENS: 'BTC,ETH'
          PAPER_DISCOVERY_PAPER_ONLY_ROUTES: 'btc-eth-uniswap,eth-usdc-curve'
          ARBIBOT_DEV_OPERATOR_ID: 'e2e-test-operator'
        run: bash tools/ci-e2e-phase3-paper-discovery.sh

  e2e-phase4-tier-routing:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arbibot
          POSTGRES_PASSWORD: arbibot
          POSTGRES_DB: arbibot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arbibot -d arbibot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Phase 4 intake tier routing + throttle smoke
        env:
          DATABASE_URL: postgres://arbibot:arbibot@127.0.0.1:5432/arbibot
        run: bash tools/ci-e2e-phase4-tier-routing.sh

  bus-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Outbox-kafka-bridge smoke test + optional Redpanda compose
        run: bash tools/ci-bus-smoke.sh

  graphify-check:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install graphify
        run: pip install graphifyy
      - name: Rebuild knowledge graph
        run: python -c "from graphify.watch import _rebuild_code; from pathlib import Path; _rebuild_code(Path('.'))"
      - name: Graph summary
        run: cat graphify-out/GRAPH_REPORT.md
      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphify-report
          path: graphify-out/GRAPH_REPORT.md
          retention-days: 7
