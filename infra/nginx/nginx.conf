# Arbibot 2 — nginx reverse proxy for production
# TLS termination + routing to operator dashboard + backend services
#
# Usage: mounted in docker-compose.prod.yml
# Certificates: place in infra/nginx/ssl/ (fullchain.pem + privkey.pem)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # ── Rate limiting ───────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=10r/s;

    # ── Security headers ────────────────────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Upstream services ───────────────────────────────────────
    upstream web_dashboard {
        server web:3000;
    }

    upstream prometheus_ui {
        server prometheus:9090;
    }

    upstream grafana_ui {
        server grafana:3000;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ───────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS (only enable after confirming HTTPS works)
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # ── Operator Dashboard ──────────────────────────────────
        location / {
            limit_req zone=web burst=20 nodelay;
            proxy_pass http://web_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js WebSocket (HMR — dev only, safe to keep)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Backend API proxy (if direct API access needed) ─────
        # Uncomment for external API access beyond BFF:
        # location /api/risk/ {
        #     limit_req zone=api burst=50 nodelay;
        #     proxy_pass http://risk-service:3000/;
        # }

        # ── Metrics (restrict to internal VPN / observability) ──
        # Do NOT expose /metrics publicly. Uncomment only with IP allowlist:
        # location /metrics {
        #     allow 10.0.0.0/8;
        #     allow 172.16.0.0/12;
        #     deny all;
        #     proxy_pass http://$upstream;
        # }

        # ── Grafana (operator monitoring) ───────────────────────
        location /grafana/ {
            proxy_pass http://grafana_ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}