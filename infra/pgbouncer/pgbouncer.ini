; Arbibot 2 — PgBouncer Connection Pooler
;
; Intercepts PostgreSQL connections from 12 NestJS services + Next.js web.
; Runs as a sidecar in front of PostgreSQL.
;
; Usage:
;   Services connect to pgbouncer:6432 instead of postgres:5432
;   PgBouncer pools connections to postgres:5432
;
; DATABASE_URL in .env should be:
;   postgres://arbibot:${POSTGRES_PASSWORD}@pgbouncer:6432/arbibot

[databases]
; Route all DBs to the real PostgreSQL
arbibot = host=postgres port=5432 dbname=arbibot

[pgbouncer]
; Listen on all interfaces inside the Docker network
listen_addr = 0.0.0.0
listen_port = 6432

; Pool mode: transaction is recommended for NestJS/TypeORM
; - transaction: connection released after each transaction (best for OLTP)
; - session: connection released when client disconnects
; - statement: connection released after each statement
pool_mode = transaction

; Connection limits
; 12 services × ~5 connections each = 60, plus some headroom
max_client_conn = 200
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 3

; Timeout settings
server_idle_timeout = 300
client_idle_timeout = 600
client_login_timeout = 15
query_timeout = 30
query_wait_timeout = 60

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Auth — use plain-text password passed from .env via userlist.txt
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt

; Admin console (accessible only within Docker network)
admin_users = arbibot
stats_users = arbibot

; Health check
; PgBouncer will verify server connections are alive
server_check_query = SELECT 1
server_check_delay = 10

; DNS
dns_max_ttl = 15