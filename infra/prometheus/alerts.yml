# Arbibot 2 — Prometheus Alert Rules
# Place alongside prometheus.yml and add to rule_files

groups:
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Prometheus cannot reach {{ $labels.job }} on {{ $labels.instance }} for 2 minutes."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value }} on {{ $labels.job }}."

  - name: paper_trading
    rules:
      - alert: PaperDriftBpsHigh
        expr: arb_paper_drift_bps_avg_5m > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Paper drift is high ({{ $value }} bps)"
          description: "Average paper drift over 5m exceeds 50 bps threshold."

      - alert: PaperDriftBpsSustainedHigh
        expr: arb_paper_drift_bps_max_15m > 30
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Sustained paper drift ({{ $value }} bps for 15m)"
          description: "Paper drift has been above 30 bps for 15 minutes."

  - name: dex_health
    rules:
      - alert: DEXUnhealthy
        expr: arb_dex_health_status{status="unhealthy"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "DEX infrastructure is unhealthy"
          description: "DEX health check reports unhealthy status for more than 3 minutes."

      - alert: DEXRPCDegraded
        expr: arb_dex_health_status{status="degraded"} == 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "DEX RPC is degraded"
          description: "DEX RPC latency or availability is degraded for 10 minutes."

  - name: system_resources
    rules:
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 400
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: "Service {{ $labels.job }} is using {{ $value }} MB resident memory."

  - name: intake
    rules:
      - alert: IntakeDegraded
        expr: arb_intake_degradation_active == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Market intake is in degraded mode"
          description: "Market intake service has been in degraded/fallback mode for 5 minutes."

  - name: reconciliation
    rules:
      - alert: ReconciliationMismatches
        expr: increase(arb_reconciliation_mismatches_total[15m]) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Reconciliation mismatches detected ({{ $value }} in 15m)"
          description: "Reconciliation service has detected {{ $value }} mismatches in the last 15 minutes. Run recon P0 procedure."

  - name: capital_execution
    rules:
      - alert: CapitalExhaustion
        expr: arb_capital_available_usd < 1000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Available capital below $1000 ({{ $value }} USD)"
          description: "Capital service reports available capital under $1000 USD for 5 minutes. New reservations may fail."

      - alert: ExecutionPlanStuck
        expr: max by (state) (time() - arb_execution_plan_state_changed_timestamp_seconds{state=~"armed|executing"}) > 600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Execution plan stuck in {{ $labels.state }} state"
          description: "An execution plan has been in {{ $labels.state }} state for more than 10 minutes without progress."

  - name: messaging
    rules:
      - alert: OutboxRelayBacklog
        expr: arb_outbox_relay_pending_total > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Outbox relay backlog is high ({{ $value }} pending)"
          description: "Outbox relay has more than 100 pending events for 5 minutes. Check relay worker and Kafka/Redpanda connectivity."

  - name: infrastructure
    rules:
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space is below 15% on {{ $labels.instance }} ({{ $value }} free)."