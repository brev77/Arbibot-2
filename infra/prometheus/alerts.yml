# Arbibot 2 — Prometheus Alert Rules
# Place alongside prometheus.yml and add to rule_files

groups:
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Prometheus cannot reach {{ $labels.job }} on {{ $labels.instance }} for 2 minutes."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value }} on {{ $labels.job }}."

  - name: paper_trading
    rules:
      - alert: PaperDriftBpsHigh
        expr: arb_paper_drift_bps_avg_5m > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Paper drift is high ({{ $value }} bps)"
          description: "Average paper drift over 5m exceeds 50 bps threshold."

      - alert: PaperDriftBpsSustainedHigh
        # Guard: only fire if new drift samples are still arriving (gauge not stale).
        # Gap #4 (Drill #1): without this guard, MTTR was ~30m because the recording
        # rule retained stale gauge values. Combined with self-heal worker (Gap #3),
        # stale gauges are reset to 0 within 1 minute, so this guard clears the alert.
        # Window reduced 15m -> 10m for drill/test MTTR target.
        expr: (arb_paper_drift_bps_max_15m > 30) and on() (rate(arb_paper_drift_samples_recorded_total[5m]) > 0)
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Sustained paper drift ({{ $value }} bps for 10m)"
          description: "Paper drift has been above 30 bps for 10 minutes with active samples. Runbook: docs/drill-1-paper-incident.md."

      # Gap #3 safety net: detect if self-heal worker is stuck or erroring.
      - alert: PaperDriftSelfHealWorkerDown
        expr: increase(arb_paper_drift_self_heal_cycles_total[5m]) < 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Paper drift self-heal worker is not running"
          description: "No self-heal cycles in the last 5 minutes (10m sustained). Check PAPER_DRIFT_SELF_HEAL_ENABLED and paper-trading-service logs."

      - alert: PaperDriftSelfHealErrors
        expr: increase(arb_paper_drift_self_heal_cycles_total{status="error"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Paper drift self-heal worker errors ({{ $value }} in 15m)"
          description: "Self-heal worker reported errors. Check paper-trading-service logs for updateStaleGauges() failures."

  - name: dex_health
    rules:
      - alert: DEXUnhealthy
        expr: arb_dex_health_status{status="unhealthy"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "DEX infrastructure is unhealthy"
          description: "DEX health check reports unhealthy status for more than 3 minutes."

      - alert: DEXRPCDegraded
        expr: arb_dex_health_status{status="degraded"} == 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "DEX RPC is degraded"
          description: "DEX RPC latency or availability is degraded for 10 minutes."

  - name: system_resources
    rules:
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 400
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: "Service {{ $labels.job }} is using {{ $value }} MB resident memory."

  - name: intake
    rules:
      - alert: IntakeDegraded
        expr: arb_intake_degradation_active == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Market intake is in degraded mode"
          description: "Market intake service has been in degraded/fallback mode for 5 minutes."

  - name: reconciliation
    rules:
      - alert: ReconciliationMismatches
        expr: increase(arb_reconciliation_mismatches_total[15m]) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Reconciliation mismatches detected ({{ $value }} in 15m)"
          description: "Reconciliation service has detected {{ $value }} mismatches in the last 15 minutes. Run recon P0 procedure."

  - name: capital_execution
    rules:
      - alert: CapitalExhaustion
        expr: arb_capital_available_usd < 1000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Available capital below $1000 ({{ $value }} USD)"
          description: "Capital service reports available capital under $1000 USD for 5 minutes. New reservations may fail."

      - alert: ExecutionPlanStuck
        expr: max by (state) (time() - arb_execution_plan_state_changed_timestamp_seconds{state=~"armed|executing"}) > 600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Execution plan stuck in {{ $labels.state }} state"
          description: "An execution plan has been in {{ $labels.state }} state for more than 10 minutes without progress."

  - name: messaging
    rules:
      - alert: OutboxRelayBacklog
        expr: arb_outbox_relay_pending_total > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Outbox relay backlog is high ({{ $value }} pending)"
          description: "Outbox relay has more than 100 pending events for 5 minutes. Check relay worker and Kafka/Redpanda connectivity."

  - name: infrastructure
    rules:
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space is below 15% on {{ $labels.instance }} ({{ $value }} free)."

  # ───────────────────────────────────────────────────────────────────
  # SLO Multi-Window Multi-Burn-Rate Alerts
  # Based on Google SRE Workbook §5 (https://sre.google/workbook/alerting-on-slos/)
  # SLO target: 99.9% monthly availability over 30-day window
  # Page-level (severity=critical): 2% budget in 1h — 14.4× burn rate
  # Page-level (severity=critical): 5% budget in 6h — 6× burn rate
  # Ticket-level (severity=warning): 10% budget in 3d — 1× burn rate
  # ───────────────────────────────────────────────────────────────────
  - name: slo_burn_rate
    rules:
      # Page: fast burn, 2% budget consumed in 1h (14.4× burn)
      - alert: SLOFastBurnCritical
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
            /
            sum(rate(http_requests_total[5m])) by (job)
            > (14.4 * 0.001)
          )
          and
          (
            sum(rate(http_requests_total{status=~"5.."}[1h])) by (job)
            /
            sum(rate(http_requests_total[1h])) by (job)
            > (14.4 * 0.001)
          )
        for: 2m
        labels:
          severity: critical
          slo: availability
          burn_window: fast
        annotations:
          summary: "SLO fast burn rate on {{ $labels.job }} (page)"
          description: "Service {{ $labels.job }} is consuming 2% of the 30-day error budget in 1 hour. Burn rate >14.4× the SLO (99.9%). Page immediately."

      # Page: slow burn, 5% budget consumed in 6h (6× burn)
      - alert: SLOSlowBurnCritical
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[30m])) by (job)
            /
            sum(rate(http_requests_total[30m])) by (job)
            > (6 * 0.001)
          )
          and
          (
            sum(rate(http_requests_total{status=~"5.."}[6h])) by (job)
            /
            sum(rate(http_requests_total[6h])) by (job)
            > (6 * 0.001)
          )
        for: 15m
        labels:
          severity: critical
          slo: availability
          burn_window: slow
        annotations:
          summary: "SLO slow burn rate on {{ $labels.job }} (page)"
          description: "Service {{ $labels.job }} is consuming 5% of the 30-day error budget in 6 hours. Burn rate >6× the SLO (99.9%). Page."

      # Ticket: medium burn, 10% budget consumed in 3d (1× burn)
      - alert: SLOMediumBurnWarning
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[2h])) by (job)
            /
            sum(rate(http_requests_total[2h])) by (job)
            > (1 * 0.001)
          )
          and
          (
            sum(rate(http_requests_total{status=~"5.."}[1d])) by (job)
            /
            sum(rate(http_requests_total[1d])) by (job)
            > (1 * 0.001)
          )
        for: 1h
        labels:
          severity: warning
          slo: availability
          burn_window: medium
        annotations:
          summary: "SLO medium burn rate on {{ $labels.job }} (ticket)"
          description: "Service {{ $labels.job }} is consuming 10% of the 30-day error budget in 3 days. On-track SLO violation. Investigate in business hours."

      # Latency SLO: p99 < 500ms for 99.9% requests (Tier 1 from observability-tracing.md)
      # Using histogram_quantile for p99 latency
      - alert: SLOLatencyFastBurn
        expr: |
          (
            sum(rate(http_request_duration_seconds_bucket{le="0.5"}[5m])) by (job)
            /
            sum(rate(http_request_duration_seconds_count[5m])) by (job)
            < (1 - 14.4 * 0.001)
          )
          and
          (
            sum(rate(http_request_duration_seconds_bucket{le="0.5"}[1h])) by (job)
            /
            sum(rate(http_request_duration_seconds_count[1h])) by (job)
            < (1 - 14.4 * 0.001)
          )
        for: 2m
        labels:
          severity: critical
          slo: latency
          burn_window: fast
        annotations:
          summary: "Latency SLO fast burn on {{ $labels.job }} (page)"
          description: "Less than 99.9% of requests complete under 500ms on {{ $labels.job }}. Burn rate >14.4×. Page."
