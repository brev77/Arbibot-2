# Local dependencies for Arbibot 2 Phase 1 (Postgres + Redis).
# Usage: docker compose -f infra/docker-compose.dev.yml up -d
#
# Env (example):
#   DATABASE_URL=postgres://arbibot:arbibot@127.0.0.1:15432/arbibot
# Host port 15432 avoids clashing with a local PostgreSQL install bound to 5432 (common on dev machines).
#   REDIS_URL=redis://127.0.0.1:6379
#
# Backend defaults (host-run Nest apps): risk 3000, opportunity 3010, capital 3011,
# execution-orchestrator 3012, audit 3013, canonical-market 3014, market-intake 3015.
#
# Optional event bus (Redpanda — Kafka API):
#   docker compose -f infra/docker-compose.dev.yml --profile bus up -d
# Host apps / @arbibot/outbox-kafka-bridge: KAFKA_BROKERS=127.0.0.1:19092
#
# Optional observability stack (Prometheus + Alertmanager + Grafana + Loki + Promtail):
#   docker compose -f infra/docker-compose.dev.yml --profile observability up -d
#   Prometheus: http://127.0.0.1:9090
#   Alertmanager: http://127.0.0.1:9093
#   Grafana:     http://127.0.0.1:3001  (admin/admin)
#   Loki:        http://127.0.0.1:3100
#
# Optional Hermes Agent (GLM 5.2 + Telegram, LLM-ассистент оператора):
#   docker compose -f infra/docker-compose.dev.yml --profile hermes-agent up -d
#   Требует собранный MCP-сервер (npm run build:hermes-mcp) и .env (секция hermes-agent).
#
# When you add app containers to this file, use:
#   depends_on:
#     postgres:
#       condition: service_healthy
#     redis:
#       condition: service_healthy
# so Nest/Next start after DB/Redis are ready.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arbibot
      POSTGRES_PASSWORD: arbibot
      POSTGRES_DB: arbibot
    ports:
      - '15432:5432'
    volumes:
      - arbibot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U arbibot -d arbibot']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - arbibot_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.11
    profiles: [bus]
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:19092
      - --smp
      - '1'
      - --memory
      - 1G
      - --mode
      - dev-container
    ports:
      - '19092:19092'

  # ── Observability stack (profile: observability) ───────────────────
  # Prom scrape targets point to host.docker.internal so it works with
  # NestJS apps running directly on the host via `npm run dev:*`.
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: [observability]
    # PROMETHEUS_CONFIG (default: prometheus.dev.yml — apps run on host via npm run dev:*):
    #   - prometheus.dev.yml  — scrape targets via host.docker.internal (DEV mode, default)
    #   - prometheus.yml      — scrape targets by container name (apps in containers)
    # Override with: PROMETHEUS_CONFIG=prometheus.yml docker compose ... up -d
    command:
      - '--config.file=/etc/prometheus/${PROMETHEUS_CONFIG:-prometheus.dev.yml}'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/:/etc/prometheus/:ro
      # Recording rules live under infra/grafana/recording-rules/ (co-located
      # with Grafana dashboards). Mount at a separate path to avoid nested
      # read-only mount conflicts inside /etc/prometheus.
      - ./grafana/recording-rules:/recording-rules:ro
      - arbibot_prom_data:/prometheus
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: [observability]
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - '9093:9093'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - arbibot_am_data:/alertmanager

  grafana:
    image: grafana/grafana-oss:11.3.0
    profiles: [observability]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - '3001:3000'
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - arbibot_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.2.1
    profiles: [observability]
    command: ['-config.file=/etc/loki/loki-config.yaml']
    ports:
      - '3100:3100'
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - arbibot_loki_data:/loki

  promtail:
    image: grafana/promtail:3.3.2
    profiles: [observability]
    command: ['-config.file=/etc/promtail/promtail-config.yaml']
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/log:/var/log:ro
    depends_on:
      - loki

  # ── Hermes Agent (profile: hermes-agent) ───────────────────────────
  # Внешний агент NousResearch Hermes Agent — LLM-ассистент оператора
  # (GLM 5.2 + Telegram, см. docs/adr-hermes-agent-glm-telegram.md).
  #
  # Публичного официального Docker-образа Hermes Agent нет, поэтому сервис
  # оставлен шаблоном: базовый python:3.11-slim + установка бинарника и
  # `hermes gateway run`. Подставьте вашу сборку/образ при необходимости.
  #
  # Запуск:
  #   docker compose -f infra/docker-compose.dev.yml --profile hermes-agent up -d
  #   npm run dev:stack:hermes-agent
  #
  # Пререквизиты: собранный MCP-сервер (npm run build:hermes-mcp) и заполненный
  # .env (секция hermes-agent: HERMES_LLM_API_KEY, TELEGRAM_BOT_TOKEN,
  # OPERATOR_TELEGRAM_ID, HERMES_API_KEY). Gateway (apps/hermes-gateway) должен
  # быть доступен по HERMES_GATEWAY_URL.
  hermes-agent:
    image: python:3.11-slim
    profiles: [hermes-agent]
    working_dir: /workspace
    # TODO(hermes-agent): заменить на образ вашей сборки агента, если есть.
    # Универсальный путь: установить бинарник hermes и запустить messaging gateway.
    # ⚠️ `gateway run`, НЕ `run` — upstream hermes-agent (0.13–0.19) не имеет `run`.
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends curl &&
      curl -fsSL https://hermes-agent.nousresearch.com/install.sh | sh &&
      hermes gateway run"
    env_file:
      - ../.env
    environment:
      HERMES_GATEWAY_URL: ${HERMES_GATEWAY_URL:-http://host.docker.internal:3020}
      HERMES_MCP_SERVER_PATH: /workspace/packages/hermes-mcp-server/dist/index.js
    volumes:
      # Конфиг + скиллы (read-only).
      - ../tools/hermes-agent:/config:ro
      # Собранный MCP-сервер монорепо (нужен пересборкой: npm run build:hermes-mcp).
      - ../packages/hermes-mcp-server/dist:/workspace/packages/hermes-mcp-server/dist:ro
      # SQLite-память агента (session/memory).
      - arbibot_hermes_agent_data:/workspace/data
    # В dev агент подключается к gateway, запущенному на хосте (npm run dev:hermes).
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  arbibot_pg_data:
  arbibot_redis_data:
  arbibot_prom_data:
  arbibot_am_data:
  arbibot_grafana_data:
  arbibot_loki_data:
  arbibot_hermes_agent_data: