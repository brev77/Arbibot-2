# Local dependencies for Arbibot 2 Phase 1 (Postgres + Redis).
# Usage: docker compose -f infra/docker-compose.dev.yml up -d
#
# Env (example):
#   DATABASE_URL=postgres://arbibot:arbibot@127.0.0.1:5432/arbibot
#   REDIS_URL=redis://127.0.0.1:6379

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arbibot
      POSTGRES_PASSWORD: arbibot
      POSTGRES_DB: arbibot
    ports:
      - '5432:5432'
    volumes:
      - arbibot_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - arbibot_redis_data:/data

volumes:
  arbibot_pg_data:
  arbibot_redis_data:
