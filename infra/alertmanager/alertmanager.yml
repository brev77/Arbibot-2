# Arbibot 2 — Alertmanager Configuration (DEV / LOCAL)
#
# This is the local-dev configuration (infra/docker-compose.dev.yml, profile
# `observability`). It mirrors alerts to the Arbibot incidents pipeline only —
# no external paging (Slack/PagerDuty) is wired in dev.
#
# For PRODUCTION, use infra/alertmanager/alertmanager.yml.tpl, which is rendered
# by infra/docker/entrypoint.alertmanager.sh via envsubst with real paging
# receivers (Slack + PagerDuty). See docs/observability-tracing.md (on-call v1).
#
# Templating:
#   - Alert name: {{ .GroupLabels.alertname }}
#   - Severity:   {{ .CommonLabels.severity }}
#   - Summary:    {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
#
# Reload without restart (requires --web.enable-lifecycle on prometheus side):
#   curl -X POST http://localhost:9093/-/reload

global:
  resolve_timeout: 5m

# ── Routes ──────────────────────────────────────────────────────
route:
  receiver: "default"
  group_by: ["alertname", "severity", "job"]
  # How long to wait before sending a notification after first alert
  group_wait: 30s
  # How long to wait before sending notification about new alerts added to group
  group_interval: 5m
  # How long to wait before sending notification again
  repeat_interval: 4h
  # Mirror every alert to the Arbibot incidents pipeline (Drill #1 gap #1).
  # `continue: true` ensures severity/specialized receivers still fire too.
  routes:
    - receiver: "arbibot-incidents"
      continue: true

    # Critical alerts → immediate notification
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 15s
      repeat_interval: 1h

    # Warning alerts → batched notification
    - match:
        severity: warning
      receiver: "warnings"
      group_wait: 5m
      repeat_interval: 4h

    # Paper trading specific
    - match:
        alertname: PaperDriftBpsSustainedHigh
      receiver: "paper-trading"
      repeat_interval: 30m

    # DEX alerts
    - match_re:
        alertname: DEX.*
      receiver: "dex"
      repeat_interval: 15m

    # Infrastructure alerts
    - match_re:
        alertname: (ServiceDown|HighMemoryUsage|HighErrorRate)
      receiver: "infrastructure"
      repeat_interval: 30m

# ── Receivers ───────────────────────────────────────────────────
receivers:
  # Arbibot incidents pipeline: forwards to reconciliation-service (port 3017)
  # which is the single-writer for `alertmanager_incidents` (Drill #1 gap #1).
  # Operator Web `/incidents` then merges these with reconciliation mismatches.
  # Env: ALERT_WEBHOOK_TOKEN optional Bearer secret on the receiver side.
  #
  # IMPORTANT: When Alertmanager runs in a Docker container (infra/docker-compose.dev.yml
  # profile `observability`) and reconciliation-service runs on the host via `npm run dev:*`,
  # `localhost` from inside the container refers to the container itself, NOT the host.
  # Use `host.docker.internal` which Docker Desktop resolves to the host network gateway.
  # On Linux hosts without Docker Desktop, set `extra_hosts: ["host.docker.internal:host-gateway"]`
  # in the alertmanager service definition (already present in infra/docker-compose.dev.yml).
  - name: "arbibot-incidents"
    webhook_configs:
      - url: "http://host.docker.internal:3017/alerts/webhook"
        send_resolved: true
        max_alerts: 0

  # Dev-only: non-functional no-op webhooks. In dev, alerts are observed via the
  # /incidents UI (arbibot-incidents receiver above). Production paging is wired
  # in alertmanager.yml.tpl (Slack + PagerDuty via envsubst entrypoint).
  - name: "default"
    webhook_configs:
      - url: "http://127.0.0.1:5001/alerts"
        send_resolved: true

  - name: "critical"
    webhook_configs:
      - url: "http://127.0.0.1:5001/alerts/critical"
        send_resolved: true

  - name: "warnings"
    webhook_configs:
      - url: "http://127.0.0.1:5001/alerts/warnings"
        send_resolved: true

  - name: "paper-trading"
    webhook_configs:
      - url: "http://127.0.0.1:5001/alerts/paper"
        send_resolved: true

  - name: "dex"
    webhook_configs:
      - url: "http://127.0.0.1:5001/alerts/dex"
        send_resolved: true

  - name: "infrastructure"
    webhook_configs:
      - url: "http://127.0.0.1:5001/alerts/infra"
        send_resolved: true

# ── Inhibition rules ────────────────────────────────────────────
# Suppress warning if critical alert is already firing for same job
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "job"]